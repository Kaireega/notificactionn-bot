# Market Adaptive Trading Bot Configuration

# Trading Settings
trading:
  risk_percentage: 5.0
  max_trades_per_day: 20
  default_timeframe: M1
  pairs:
    - EUR_USD
    - USD_JPY
    - GBP_JPY
  hold_time_settings:
    min_hold_time_minutes: 5
    max_hold_time_minutes: 240  # 4 hours max
    default_hold_time_minutes: 60  # 1 hour default
    market_condition_hold_times:
      news_reactionary: [5, 60]    # 5 min to 1 hour
      reversal: [15, 120]          # 15 min to 2 hours
      breakout: [30, 180]          # 30 min to 3 hours
      ranging: [10, 90]            # 10 min to 1.5 hours

# Multi-Timeframe Analysis Settings
multi_timeframe:
  enabled: true
  timeframes:
    - M1
    - M5
    - M15
  weights:
    M1: 0.4    # 40% weight - immediate signals
    M5: 0.4    # 40% weight - short-term signals
    M15: 0.2   # 20% weight - trend confirmation
  minimum_timeframes: 2
  consensus_threshold: 0.6

# Market Conditions
market_conditions:
  volatility_threshold: 0.0015
  trend_strength_threshold: 0.7
  breakout_threshold: 0.0020
  ranging_threshold: 0.0008

# Risk Management
risk_management:
  max_daily_loss: 10.0
  max_position_size: 100000.0
  correlation_limit: 0.7
  max_open_trades: 5
  stop_loss_atr_multiplier: 1.5
  trailing_stop: true
  trailing_stop_atr_multiplier: 1.0

# AI Analysis
ai_analysis:
  model: gpt-4
  max_tokens: 1000
  temperature: 0.3
  analysis_frequency: 60  # 1 minute
  confidence_threshold: 0.5  # Lowered from 0.7 to generate more recommendations
  signal_strength_threshold: 0.03  # Lowered threshold for more trading opportunities (3% minimum)
  minimum_confidence: 0.6  # Lowered confidence requirement for more trades
  risk_reward_ratio_minimum: 1.5  # Day trading needs better risk/reward
  include_news_sentiment: true
  include_technical_analysis: true
  include_market_context: true

# Notifications
notifications:
  telegram:
    enabled: true
    send_charts: true
    send_analysis: true
  email:
    enabled: true
    daily_summary: true
    trade_alerts: true
  loop_reports:
    enabled: true # Disabled to reduce notification spam
    send_on_error: true
    include_performance: true
  notification_cooldown: 60  # 1 minute
  manual_trade_approval: true
  pre_trade_cooldown_seconds: 0

# Data Collection
data_collection:
  historical_days: 30
  update_frequency: 60  # 1 minute
  store_raw_data: true
  compression: true
  backup_frequency: 24

# Simulation
simulation:
  enabled: true
  data_source: db   # csv | oanda | db
  csv_dir: data

# Performance Tracking
performance:
  track_metrics: true
  save_trades: true
  generate_reports: true
  report_frequency: daily 